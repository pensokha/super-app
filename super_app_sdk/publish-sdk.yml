name: Publish SDK to NPM

on:
  push:
    tags:
      - 'v*.*.*' # Trigger this workflow on tags like v1.0.0, v1.2.3, etc.

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Use a recent LTS version of Node.js
          registry-url: 'https://registry.npmjs.org' # Set the registry for npm

      - name: Install dependencies
        run: npm ci # Use 'ci' for cleaner, faster installs in CI environments

      - name: Build SDK
        run: npm run build

      - name: Publish to NPM
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}